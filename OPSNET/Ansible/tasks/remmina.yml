- name: Create Remmina connection profile for the new box
  delegate_to: localhost  
  become: false
  ansible.builtin.copy:
    dest: "~/.local/share/remmina/{{ inventory_hostname }}.remmina"
    content: |
      [remmina]
      password=
      gateway_username=
      notes_text=
      window_height=1052
      vc=
      smartcard_pin=
      preferipv6=0
      ssh_tunnel_loopback=0
      serialname=
      tls-seclevel=
      freerdp_log_level=INFO
      scale=2
      printer_overrides=
      name={{ inventory_hostname }}
      console=0
      colordepth=99
      security=
      smartcard-logon=0
      precommand=
      disable_fastpath=0
      postcommand=
      left-handed=0
      multitransport=0
      ssh_tunnel_command_args=
      group=Lab-Inf
      server={{ ansible_host }}
      ssh_tunnel_certfile=
      glyph-cache=0
      rdp_idle_keypress_combo=1
      disableclipboard=0
      rdp_idle_keypress_time=No
      audio-output=
      ssh_tunnel_command=
      monitorids=
      cert_ignore=0
      disconnect-prompt=0
      parallelpath=
      protocol=RDP
      old-license=0
      labels=
      ssh_tunnel_password=
      resolution_mode=1
      ssh_tunnel_enabled=0
      assistance_mode=0
      pth=
      disableautoreconnect=0
      loadbalanceinfo=
      clientbuild=
      gateway_server=
      clientname=
      resolution_width=0
      allow_empty_pass=0
      drive=
      serialpermissive=0
      relax-order-checks=0
      username=cyberfox
      base-cred-for-gw=0
      gateway_domain=
      network=lan
      rdp2tcp=
      gateway_password=
      rdp_reconnect_attempts=
      domain=
      serialdriver=
      restricted-admin=0
      force_multimon=0
      exec=
      serialpath=
      multimon=0
      enable-autostart=0
      smartcardname=
      profile-lock=0
      ssh_tunnel_passphrase=
      usb=
      shareprinter=0
      disablepasswordstoring=0
      quality=0
      span=0
      shareparallel=0
      parallelname=
      viewmode=1
      ssh_tunnel_auth=0
      keymap=
      ssh_tunnel_username=
      execpath=
      shareserial=0
      resolution_height=0
      rdp_mouse_jitter=No
      useproxyenv=0
      sharesmartcard=0
      freerdp_log_filters=
      microphone=
      timeout=
      ssh_tunnel_privatekey=
      gwtransp=http
      ssh_tunnel_server=
      ignore-tls-errors=1
      window_maximize=1
      keyboard_grab=1
      dvc=
      gateway_usage=0
      forceipvx=0
      window_width=1920
      no-suppress=0
      websockets=0
      sound=off
      disable-smooth-scrolling=0              
    mode: '0600'