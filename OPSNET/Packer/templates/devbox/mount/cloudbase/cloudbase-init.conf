[DEFAULT]
username=admin
groups=Administrator
inject_user_password=false
config_drive_raw_hhd=true
config_drive_cdrom=true
config_drive_vfat=true
bsdtar_path=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\bin\bsdtar.exe
mtools_path=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\bin\
verbose=true
debug=true
log_dir=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\log\
log_file=cloudbase-init.log
default_log_levels=comtypes=INFO,suds=INFO,iso8601=WARN,requests=WARN
logging_serial_port_settings=
mtu_use_dhcp_config=true
ntp_use_dhcp_config=true
local_scripts_path=C:\Program Files\Cloudbase Solutions\Cloudbase-Init\LocalScripts\
check_latest_version=false
plugins=cloudbaseinit.plugins.common.sethostname.SetHostNamePlugin,
	    cloudbaseinit.plugins.common.networkconfig.NetworkConfigPlugin,
		cloudbaseinit.plugins.windows.winrmlistener.ConfigWinRMListenerPlugin
metadata_services=cloudbaseinit.metadata.services.configdrive.ConfigDriveService

# WinRM Configuration
winrm_enable_basic_auth=True
winrm_configure_https_listener=True
winrm_configure_http_listener=False



#ps1_sysnative
users:
  - name: cyberfox
    passwd: P@ssW0rd1!!!
    groups: Administrators
    # This ensures the user isn't prompted to change password on first login
    primary_group: Administrators

run_cmd:
  # 1. Ensure the user is also in the Remote Management Users group
  - powershell.exe -ExecutionPolicy Bypass -Command "Add-LocalGroupMember -Group 'Remote Management Users' -Member 'cyberfox' -ErrorAction SilentlyContinue"
  
  # 2. THE CRITICAL FIX: Enable Administrative tokens over WinRM for local accounts
  - powershell.exe -ExecutionPolicy Bypass -Command "New-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System' -Name 'LocalAccountTokenFilterPolicy' -Value 1 -PropertyType DWord -Force"
  
  # 3. Ensure the WinRM service is running and the firewall is open
  - powershell.exe -ExecutionPolicy Bypass -Command "winrm quickconfig -quiet"
  - powershell.exe -ExecutionPolicy Bypass -Command "Set-Service WinRM -StartupType Automatic"